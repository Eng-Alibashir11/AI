<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة الختمة الجماعية</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --primary: #2c3e50; --done: #27ae60; --text: #34495e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h2 { margin-bottom: 10px; color: var(--primary); font-size: 1.5rem; }
        .progress-box { background: #e0e0e0; height: 12px; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #bar { background: var(--done); width: 0%; height: 100%; transition: 0.5s ease; }
        #stats { font-weight: bold; margin-bottom: 20px; display: block; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        button { aspect-ratio: 1; border: 2px solid var(--primary); background: white; color: var(--primary); border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button.completed { background: var(--done); color: white; border-color: var(--done); box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

<div class="container">
    <h2>﴿ ختْمَة مشتركة ﴾</h2>
    <div class="progress-box"><div id="bar"></div></div>
    <span id="stats">جاري التحميل...</span>

    <div class="grid" id="grid">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // إعدادات مشروعك التي أرسلتها
    const firebaseConfig = {
        apiKey: "AIzaSyDWEURJFC2xJC9afCfIpNUno4XahVb8HAM",
        authDomain: "khatma-85d12.firebaseapp.com",
        databaseURL: "https://khatma-85d12-default-rtdb.firebaseio.com",
        projectId: "khatma-85d12",
        storageBucket: "khatma-85d12.firebasestorage.app",
        messagingSenderId: "801962624693",
        appId: "1:801962624693:web:764883064453e6e1e3a0fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gridDiv = document.getElementById('grid');
    const bar = document.getElementById('bar');
    const stats = document.getElementById('stats');

    // إنشاء الأزرار الـ 30
    for (let i = 1; i <= 30; i++) {
        const btn = document.createElement('button');
        btn.id = `p-${i}`;
        btn.innerText = i;
        btn.onclick = () => togglePart(i);
        gridDiv.appendChild(btn);
    }

    // وظيفة الضغط لتحديث القيمة في Firebase للجميع
    async function togglePart(num) {
        const partRef = ref(db, 'live_khatma/part' + num);
        const snapshot = await get(partRef);
        const currentState = snapshot.val() || false;
        set(partRef, !currentState);
    }

    // مراقبة التغييرات وتحديث الصفحة فوراً عند الجميع
    onValue(ref(db, 'live_khatma'), (snapshot) => {
        const data = snapshot.val() || {};
        let count = 0;

        for (let i = 1; i <= 30; i++) {
            const btn = document.getElementById(`p-${i}`);
            if (data['part' + i] === true) {
                btn.classList.add('completed');
                count++;
            } else {
                btn.classList.remove('completed');
            }
        }

        const percent = Math.round((count / 30) * 100);
        bar.style.width = percent + '%';
        stats.innerText = `الإنجاز: ${percent}% (${count} من 30)`;
    });
</script>

</body>
</html>
