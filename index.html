<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الختمة الأسبوعية</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Changa:wght@300;500&display=swap');
        :root { --main-color: #1a5276; --gold: #c0a16b; --accent: #27ae60; --text: #2c3e50; }
        body { font-family: 'Changa', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; color: var(--text); }
        .container { background: white; width: 100%; max-width: 650px; margin: auto; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; position: relative; border: 1px solid #e1e8ed; }
        
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .overlay-msg { background: var(--main-color); color: white; padding: 25px 40px; border-radius: 20px; font-size: 1.3em; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border: 2px solid var(--gold); }

        .header { background: linear-gradient(135deg, var(--main-color), #2980b9); color: white; padding: 35px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .quran-verse { font-family: 'Amiri', serif; font-size: 1.6em; color: var(--gold); margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .timer-box { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 50px; display: inline-block; font-size: 0.9em; margin-top: 15px; border: 1px solid rgba(255,255,255,0.3); }
        
        .stats-container { display: flex; justify-content: center; gap: 15px; padding: 20px; background: #fdfbf7; }
        .stat-card { background: white; padding: 10px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 3px solid var(--gold); font-weight: bold; }

        table { width: 100%; border-collapse: collapse; }
        tr:nth-child(even) { background-color: #fafcfd; }
        td { padding: 18px 15px; border-bottom: 1px solid #edf2f7; }

        .user-info { display: flex; flex-direction: column; text-align: right; }
        .name-row { display: flex; align-items: center; gap: 10px; font-size: 1.1em; font-weight: 500; }
        .detail-row { font-size: 0.85em; color: #7f8c8d; margin-top: 4px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        
        .part-label { color: var(--main-color); background: #eef5f9; padding: 2px 8px; border-radius: 6px; font-weight: bold; }
        .time-label { color: var(--accent); font-weight: 500; }

        .status-btn { font-size: 28px; cursor: pointer; border: none; background: none; transition: transform 0.2s; }
        .done-icon { color: var(--accent); }
        .wait-icon { color: #d1d9e0; }

        .footer-awards { background: #fdfaf0; padding: 20px; text-align: center; border-top: 1px solid #eee; }
        .award-badge { background: white; padding: 6px 15px; border-radius: 25px; border: 1px solid var(--gold); display: inline-block; margin: 4px; font-size: 0.85em; transition: all 0.3s ease; }
    </style>
</head>
<body>

<div class="container">
    <div id="overlay"><div class="overlay-msg">⚖ انتهى الوقت المخصص لهذه الختمة</div></div>
    
    <div class="header">
        <h1 style="margin:0;">الختمة الأسبوعية</h1>
        <div class="quran-verse">﴿ وَرَتِّلِ الْقُرْآنَ تَرْتِيلاً ﴾</div>
        <div class="timer-box" id="timer">تحميل الوقت...</div>
    </div>

    <div class="stats-container">
        <div class="stat-card" style="color: var(--accent);">تم: <span id="doneCount">0</span></div>
        <div class="stat-card" style="color: #e74c3c;">متبقي: <span id="remCount">30</span></div>
    </div>

    <table>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="footer-awards">
        <div style="font-weight:bold; color:var(--main-color); margin-bottom:10px;">🏆 لوحة الإنجازات (الأوائل)</div>
        <div id="topUsers">بانتظار المنجزين...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPjrpRIeXlfGQVydcndV1etdy27455vVg",
        authDomain: "khatma-test.firebaseapp.com",
        databaseURL: "https://khatma-test-default-rtdb.firebaseio.com",
        projectId: "khatma-test",
        storageBucket: "khatma-test.firebasestorage.app",
        messagingSenderId: "70199271332",
        appId: "1:70199271332:web:5ea2400145c8917eefeb31"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isTimeUp = false;

    const users = ["أحمد علي", "محمد حسن", "عمر خالد", "يوسف محمود", "إبراهيم فادي", "باسل كمال", "سامر منير", "فادي غسان", "حمزة عبيدة", "رامي سمير", "عمار ياسر", "قاسم كريم", "وائل ناصر", "مصطفى نور", "هاني جاسم", "ضياء حقي", "ماهر زين", "ليث أيهم", "نزار قباني", "جابر عثرات", "طارق زياد", "معتز فوزي", "هاشم صبري", "كرم سعيد", "قصي مجد", "مجاهد براء", "أسامة راشد", "منذر وليد", "زياد بشار", "غيث مروان"];
    const monthsArabic = ["كانون الثاني", "شباط", "اذار", "نيسان", "أيار", "حزيران", "تموز", "اب", "ايلول", "تشرين الأول", "تشرين الثاني", "كانون الأول"];

    const tableBody = document.getElementById('tableBody');
    users.forEach((name, i) => {
        let row = document.createElement('tr');
        row.innerHTML = `
            <td>
                <div class="user-info">
                    <div class="name-row"><span>${i+1}.</span> ${name}</div>
                    <div class="detail-row">
                        <span class="part-label">الجزء ${i+1}</span>
                        <span id="time-${i}" class="time-label"></span>
                    </div>
                </div>
            </td>
            <td style="width: 60px;">
                <button class="status-btn wait-icon" id="btn-${i}" onclick="updateStatus(${i})">⚪</button>
            </td>
        `;
        tableBody.appendChild(row);
    });

    function updateStatus(id) {
        if (isTimeUp) return;
        let mySelection = localStorage.getItem('myKhatmaPick');
        
        db.ref('khatma_status/' + id).once('value').then(snap => {
            const entry = snap.val();
            const isDone = entry && entry.status === '✅';

            if (isDone && mySelection == id) {
                db.ref('khatma_status/' + id).remove().then(() => { localStorage.removeItem('myKhatmaPick'); });
                return;
            }
            if (mySelection !== null && mySelection != id) { alert("يمكنك اختيار جزء واحد فقط."); return; }

            if (!isDone) {
                const now = new Date();
                const timeStr = `✔ أُنجز: ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} - ${now.getDate()} ${monthsArabic[now.getMonth()]}`;
                db.ref('khatma_status/' + id).set({
                    status: '✅',
                    timeRecord: timeStr,
                    timestamp: Date.now(),
                    name: users[id]
                }).then(() => { localStorage.setItem('myKhatmaPick', id); });
            }
        });
    }

    db.ref('khatma_status/').on('value', (snap) => {
        const data = snap.val() || {};
        let doneList = [];
        
        users.forEach((_, i) => {
            const btn = document.getElementById(`btn-${i}`);
            const timeSpan = document.getElementById(`time-${i}`);
            const entry = data[i];
            
            if (entry && entry.status === '✅') {
                btn.innerText = '✅'; btn.className = 'status-btn done-icon';
                timeSpan.innerText = entry.timeRecord;
                doneList.push(entry);
            } else {
                btn.innerText = '⚪'; btn.className = 'status-btn wait-icon';
                timeSpan.innerText = "";
            }
        });

        document.getElementById('doneCount').innerText = doneList.length;
        document.getElementById('remCount').innerText = 30 - doneList.length;

        // الترتيب والإزاحة في لوحة الإنجازات فقط
        doneList.sort((a, b) => a.timestamp - b.timestamp);
        const topUsersDiv = document.getElementById('topUsers');
        
        if (doneList.length > 0) {
            topUsersDiv.innerHTML = doneList.map((u, idx) => 
                `<span class="award-badge">${idx+1}. ${u.name} ⭐</span>`
            ).join('');
        } else {
            topUsersDiv.innerHTML = "بانتظار المنجزين...";
        }
    });

    function updateTimer() {
        const now = new Date();
        let nextFri = new Date();
        nextFri.setDate(now.getDate() + (5 + 7 - now.getDay()) % 7);
        nextFri.setHours(12, 0, 0, 0);
        if (now > nextFri) nextFri.setDate(nextFri.getDate() + 7);
        const diff = nextFri - now;
        if (diff <= 0) { isTimeUp = true; document.getElementById('overlay').style.display = 'flex'; return; }
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000);
        document.getElementById('timer').innerText = `المتبقي: ${d} يوم و ${h} ساعة و ${m} دقيقة`;
    }
    setInterval(updateTimer, 60000); updateTimer();
</script>
</body>
</html>
