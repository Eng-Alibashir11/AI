<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متابعة الختمة رقم 3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .quote { text-align: center; font-style: italic; color: #7f8c8d; margin-bottom: 20px; }
        .progress-container { background: #eee; border-radius: 20px; margin: 20px 0; position: relative; height: 25px; }
        .progress-bar { background: linear-gradient(90deg, #3498db, #2ecc71); height: 100%; border-radius: 20px; width: 16.6%; text-align: center; color: white; font-size: 14px; line-height: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #34495e; color: white; padding: 12px; text-align: right; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f1f1; }
        .status-done { color: #27ae60; font-weight: bold; }
        .status-wait { color: #95a5a6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 الـخِـتـمَـةُ رَقـم (3)</h1>
        <p class="quote">﴿ إِنَّ هَذَا الْقُرْآنَ يَهْدِي لِلَّتِي هِيَ أَقْوَمُ ﴾</p>
        
        <div class="progress-container">
            <div class="progress-bar">16.6%</div>
        </div>
        <p style="text-align: center;"><b>المؤشر:</b> 05 من أصل 30 جزء</p>

        <table>
            <thead>
                <tr>
                    <th>الورد</th>
                    <th>الاسم</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>01</td><td>حسن مخيليل</td><td class="status-wait">⚪ قيد الانتظار</td></tr>
                <tr><td>02</td><td>حمودي الملا</td><td class="status-done">💯 تم الإنجاز</td></tr>
                <tr><td>04</td><td>ايمن المضحي</td><td class="status-done">💯 تم الإنجاز</td></tr>
                <tr><td>10</td><td>محمد الزعو</td><td class="status-done">💯 تم الإنجاز</td></tr>
                <tr><td>15</td><td>محمود</td><td class="status-done">💯 تم الإنجاز</td></tr>
                <tr><td>16</td><td>خضر</td><td class="status-done">💯 تم الإنجاز</td></tr>
                </tbody>
        </table>
    </div>
</body>
</html>
