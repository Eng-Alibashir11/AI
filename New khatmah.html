<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الختمة الأسبوعية الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Changa:wght@300;500&display=swap');
        :root { --main-color: #1a5276; --gold: #c0a16b; --accent: #27ae60; --text: #2c3e50; }
        body { font-family: 'Changa', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; color: var(--text); }
        .container { background: white; width: 100%; max-width: 650px; margin: auto; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); overflow: hidden; position: relative; border: 1px solid #e1e8ed; }
        
        /* لوحة التحكم */
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; z-index: 2000; padding: 20px; border-radius: 20px; box-shadow: 0 0 100px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        .admin-btn { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 10px 5px; }
        .save-btn { background: var(--accent); }
        .close-btn { background: #95a5a6; }
        #overlay-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1500; }

        .header { background: linear-gradient(135deg, var(--main-color), #2980b9); color: white; padding: 35px 20px; text-align: center; border-bottom: 5px solid var(--gold); cursor: pointer; }
        .quran-verse { font-family: 'Amiri', serif; font-size: 1.6em; color: var(--gold); margin: 10px 0; }
        .stats-container { display: flex; justify-content: center; gap: 15px; padding: 20px; background: #fdfbf7; }
        .stat-card { background: white; padding: 10px 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 3px solid var(--gold); font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        tr:nth-child(even) { background-color: #fafcfd; }
        td { padding: 18px 15px; border-bottom: 1px solid #edf2f7; }
        .name-row { font-size: 1.1em; font-weight: 500; }
        .part-label { color: var(--main-color); background: #eef5f9; padding: 2px 8px; border-radius: 6px; font-weight: bold; font-size: 0.85em; }
        .time-label { color: var(--accent); font-weight: 500; font-size: 0.85em; margin-right: 10px; }
        .status-btn { font-size: 28px; cursor: pointer; border: none; background: none; }
        .footer-awards { background: #fdfaf0; padding: 20px; text-align: center; border-top: 1px solid #eee; }
        .award-badge { background: white; padding: 6px 15px; border-radius: 25px; border: 1px solid var(--gold); display: inline-block; margin: 4px; font-size: 0.85em; }
    </style>
</head>
<body>

<div id="overlay-bg"></div>
<div id="adminPanel">
    <h3>⚙ لوحة الإعدادات</h3>
    <p style="font-size: 0.8em; color: #666;">يمكنك تصفير الإنجازات أو تعديل الأسماء</p>
    <button class="admin-btn" onclick="resetAllKhatma()">تصفير جميع الإنجازات ↺</button>
    <hr>
    <div id="nameEditors" style="max-height: 200px; overflow-y: auto; text-align: right; margin-bottom: 10px;"></div>
    <button class="admin-btn save-btn" onclick="saveNewNames()">حفظ الأسماء الجديدة ✓</button>
    <button class="admin-btn close-btn" onclick="toggleAdmin()">إغلاق</button>
</div>

<div class="container">
    <div class="header" onclick="checkAdminAccess()">
        <h1 style="margin:0;">الختمة الأسبوعية</h1>
        <div class="quran-verse">﴿ وَرَتِّلِ الْقُرْآنَ تَرْتِيلاً ﴾</div>
        <div id="timer" style="font-size: 0.8em; opacity: 0.8;">جاري التحميل...</div>
    </div>

    <div class="stats-container">
        <div class="stat-card" style="color: var(--accent);">تم: <span id="doneCount">0</span></div>
        <div class="stat-card" style="color: #e74c3c;">متبقي: <span id="remCount">30</span></div>
    </div>

    <table><tbody id="tableBody"></tbody></table>

    <div class="footer-awards">
        <div style="font-weight:bold; color:var(--main-color); margin-bottom:10px;">🏆 لوحة الإنجازات (الأوائل)</div>
        <div id="topUsers">بانتظار المنجزين...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPjrpRIeXlfGQVydcndV1etdy27455vVg",
        authDomain: "khatma-test.firebaseapp.com",
        databaseURL: "https://khatma-test-default-rtdb.firebaseio.com",
        projectId: "khatma-test",
        storageBucket: "khatma-test.firebasestorage.app",
        messagingSenderId: "70199271332",
        appId: "1:70199271332:web:5ea2400145c8917eefeb31"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let defaultUsers = ["أحمد علي", "محمد حسن", "عمر خالد", "يوسف محمود", "إبراهيم فادي", "باسل كمال", "سامر منير", "فادي غسان", "حمزة عبيدة", "رامي سمير", "عمار ياسر", "قاسم كريم", "وائل ناصر", "مصطفى نور", "هاني جاسم", "ضياء حقي", "ماهر زين", "ليث أيهم", "نزار قباني", "جابر عثرات", "طارق زياد", "معتز فوزي", "هاشم صبري", "كرم سعيد", "قصي مجد", "مجاهد براء", "أسامة راشد", "منذر وليد", "زياد بشار", "غيث مروان"];
    const monthsArabic = ["كانون الثاني", "شباط", "اذار", "نيسان", "أيار", "حزيران", "تموز", "اب", "ايلول", "تشرين الأول", "تشرين الثاني", "كانون الأول"];

    // جلب الأسماء من قاعدة البيانات أو استخدام الافتراضية
    db.ref('settings/names').on('value', (snap) => {
        if(snap.val()) defaultUsers = snap.val();
        renderTable();
        renderNameEditors();
    });

    function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = "";
        defaultUsers.forEach((name, i) => {
            let row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div class="name-row"><span>${i+1}.</span> ${name}</div>
                    <div><span class="part-label">الجزء ${i+1}</span><span id="time-${i}" class="time-label"></span></div>
                </td>
                <td style="width: 60px;"><button class="status-btn" id="btn-${i}" onclick="updateStatus(${i})">⚪</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    function renderNameEditors() {
        const editorDiv = document.getElementById('nameEditors');
        editorDiv.innerHTML = defaultUsers.map((name, i) => 
            `<div style="margin-bottom:5px;">${i+1} <input type="text" id="edit-${i}" value="${name}" style="width:80%; padding:5px; border-radius:5px; border:1px solid #ccc;"></div>`
        ).join('');
    }

    function updateStatus(id) {
        let myPick = localStorage.getItem('myKhatmaPick');
        db.ref('khatma_status/' + id).once('value', snap => {
            const entry = snap.val();
            if (entry && entry.status === '✅' && myPick == id) {
                db.ref('khatma_status/' + id).remove().then(() => localStorage.removeItem('myKhatmaPick'));
            } else if (!entry || entry.status !== '✅') {
                if (myPick && myPick != id) { alert("يمكنك اختيار جزء واحد فقط."); return; }
                const now = new Date();
                const timeStr = `✔ ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')} - ${now.getDate()} ${monthsArabic[now.getMonth()]}`;
                db.ref('khatma_status/' + id).set({ status: '✅', timeRecord: timeStr, timestamp: Date.now(), name: defaultUsers[id] });
                localStorage.setItem('myKhatmaPick', id);
            }
        });
    }

    db.ref('khatma_status/').on('value', snap => {
        const data = snap.val() || {};
        let doneList = [];
        defaultUsers.forEach((_, i) => {
            const btn = document.getElementById(`btn-${i}`);
            const timeSpan = document.getElementById(`time-${i}`);
            if (data[i]) {
                btn.innerText = '✅'; btn.style.color = 'var(--accent)';
                timeSpan.innerText = data[i].timeRecord;
                doneList.push(data[i]);
            } else {
                btn.innerText = '⚪'; btn.style.color = '#d1d9e0';
                timeSpan.innerText = "";
            }
        });
        document.getElementById('doneCount').innerText = doneList.length;
        document.getElementById('remCount').innerText = 30 - doneList.length;
        doneList.sort((a,b) => a.timestamp - b.timestamp);
        document.getElementById('topUsers').innerHTML = doneList.map((u,idx) => `<span class="award-badge">${idx+1}. ${u.name} ⭐</span>`).join('') || "بانتظار المنجزين...";
    });

    // وظائف التحكم
    function checkAdminAccess() {
        const pass = prompt("أدخل رمز الإدارة للتحكم:");
        if (pass === "1234") toggleAdmin(); // يمكنك تغيير الرقم 1234 لأي رمز تريده
    }

    function toggleAdmin() {
        const panel = document.getElementById('adminPanel');
        const bg = document.getElementById('overlay-bg');
        const isVisible = panel.style.display === 'block';
        panel.style.display = isVisible ? 'none' : 'block';
        bg.style.display = isVisible ? 'none' : 'block';
    }

    function resetAllKhatma() {
        if(confirm("هل أنت متأكد من تصفير جميع الإنجازات لبدء ختمة جديدة؟")) {
            db.ref('khatma_status').remove();
            toggleAdmin();
        }
    }

    function saveNewNames() {
        let newNames = [];
        for(let i=0; i<30; i++) { newNames.push(document.getElementById(`edit-${i}`).value); }
        db.ref('settings/names').set(newNames).then(() => {
            alert("تم حفظ الأسماء الجديدة بنجاح!");
            toggleAdmin();
        });
    }

    // العداد الزمني (نفس السابق)
    function updateTimer() {
        const now = new Date();
        let nextFri = new Date();
        nextFri.setDate(now.getDate() + (5 + 7 - now.getDay()) % 7);
        nextFri.setHours(12, 0, 0, 0);
        if (now > nextFri) nextFri.setDate(nextFri.getDate() + 7);
        const diff = nextFri - now;
        const d = Math.floor(diff / 86400000), h = Math.floor((diff % 86400000) / 3600000), m = Math.floor((diff % 3600000) / 60000);
        document.getElementById('timer').innerText = `المتبقي للجمعة: ${d}ي ${h}سا ${m}د`;
    }
    setInterval(updateTimer, 60000); updateTimer();
</script>
</body>
</html>
