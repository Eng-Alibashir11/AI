<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الختمة الأسبوعية</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --gold: #d4af37; --success: #27ae60; --light: #f9f9f9; }
        body { font-family: 'Amiri', 'Segoe UI', serif; background-color: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .container { background: white; width: 100%; max-width: 600px; margin: auto; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; border-top: 8px solid var(--gold); }
        
        .header-section { text-align: center; padding: 30px 20px; background: linear-gradient(to bottom, #ffffff, #fdfbf7); }
        h1 { margin: 0; color: var(--primary); font-size: 2.2em; letter-spacing: 1px; }
        .quran-verse { margin: 10px 0; color: #555; font-style: italic; font-size: 1.3em; color: var(--success); }
        
        .timer-display { background: #fff9e6; color: #856404; padding: 12px; font-weight: bold; border-radius: 50px; display: inline-block; margin: 15px 0; border: 1px solid #ffeeba; width: 80%; }
        .stats-display { display: flex; justify-content: center; gap: 20px; font-size: 1.1em; font-weight: bold; padding: 10px; color: var(--primary); }
        .stat-item { background: var(--light); padding: 8px 20px; border-radius: 15px; border: 1px dashed #ccc; }

        table { width: 100%; border-collapse: collapse; background: white; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; text-align: center; }
        .name-cell { text-align: right; font-size: 1.05em; padding-right: 25px; }
        
        .status-btn { font-size: 26px; cursor: pointer; border: none; background: none; transition: 0.3s; }
        .done { color: var(--success); text-shadow: 0 0 5px rgba(39, 174, 96, 0.2); }
        .pending { color: #e0e0e0; }

        .hall-of-fame { background: #fdfaf0; padding: 20px; border-top: 2px solid #eee; text-align: center; }
        .hall-title { font-weight: bold; color: var(--gold); margin-bottom: 10px; display: block; text-decoration: underline; }
        .top-users { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .top-badge { background: white; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gold); font-size: 0.9em; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>الختمة الأسبوعية</h1>
        <div class="quran-verse">﴿ وَرَتِّلِ الْقُرْآنَ تَرْتِيلاً ﴾</div>
        <div class="timer-display" id="timer">جارِ حساب الوقت...</div>
        <div class="stats-display">
            <div class="stat-item">تم: <span id="doneCount" style="color:var(--success)">0</span></div>
            <div class="stat-item">متبقي: <span id="remCount" style="color:#e74c3c">30</span></div>
        </div>
    </div>

    <table>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="hall-of-fame">
        <span class="hall-title">🏆 أوائل المنجزين في هذه الختمة</span>
        <div class="top-users" id="topUsers">بانتظار المنجزين...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAPjrpRIeXlfGQVydcndV1etdy27455vVg",
        authDomain: "khatma-test.firebaseapp.com",
        databaseURL: "https://khatma-test-default-rtdb.firebaseio.com",
        projectId: "khatma-test",
        storageBucket: "khatma-test.firebasestorage.app",
        messagingSenderId: "70199271332",
        appId: "1:70199271332:web:5ea2400145c8917eefeb31"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const users = [
        "أحمد علي", "محمد حسن", "عمر خالد", "يوسف محمود", "إبراهيم فادي",
        "باسل كمال", "سامر منير", "فادي غسان", "حمزة عبيدة", "رامي سمير",
        "عمار ياسر", "قاسم كريم", "وائل ناصر", "مصطفى نور", "هاني جاسم",
        "ضياء حقي", "ماهر زين", "ليث أيهم", "نزار قباني", "جابر عثرات",
        "طارق زياد", "معتز فوزي", "هاشم صبري", "كرم سعيد", "قصي مجد",
        "مجاهد براء", "أسامة راشد", "منذر وليد", "زياد بشار", "غيث مروان"
    ];

    const tableBody = document.getElementById('tableBody');
    users.forEach((name, index) => {
        let row = document.createElement('tr');
        row.innerHTML = `<td class="name-cell"><b>${index + 1}.</b> ${name}</td>
                         <td><button class="status-btn pending" id="btn-${index}" onclick="updateStatus(${index})">⚪</button></td>`;
        tableBody.appendChild(row);
    });

    function updateStatus(id) {
        let mySelection = localStorage.getItem('myKhatmaPick');
        const btn = document.getElementById(`btn-${id}`);
        const isCurrentlyDone = btn.innerText === '✅';

        if (isCurrentlyDone && mySelection == id) {
            db.ref('khatma_status/' + id).remove().then(() => { localStorage.removeItem('myKhatmaPick'); });
            return;
        }

        if (mySelection !== null && mySelection != id) {
            alert("لديك جزء محجوز بالفعل.");
            return;
        }

        if (!isCurrentlyDone) {
            // حفظ الوقت لمعرفة الأوائل
            db.ref('khatma_status/' + id).set({
                status: '✅',
                time: Date.now(),
                name: users[id]
            }).then(() => { localStorage.setItem('myKhatmaPick', id); });
        }
    }

    db.ref('khatma_status/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        let done = 0;
        let finishedList = [];

        users.forEach((_, id) => {
            const btn = document.getElementById(`btn-${id}`);
            const entry = data[id];
            const status = (entry && entry.status) ? entry.status : '⚪';
            btn.innerText = status;
            btn.className = status === '✅' ? 'status-btn done' : 'status-btn pending';
            if (status === '✅') {
                done++;
                finishedList.push({ name: entry.name, time: entry.time });
            }
        });

        document.getElementById('doneCount').innerText = done;
        document.getElementById('remCount').innerText = 30 - done;

        // ترتيب الأوائل وتحديث الهامش
        finishedList.sort((a, b) => a.time - b.time);
        const top3 = finishedList.slice(0, 3);
        const topDiv = document.getElementById('topUsers');
        if(top3.length > 0) {
            topDiv.innerHTML = top3.map((u, i) => `<span class="top-badge">⭐ ${u.name}</span>`).join(' ');
        } else {
            topDiv.innerHTML = "بانتظار المنجزين...";
        }
    });

    function updateTimer() {
        const now = new Date();
        let nextFriday = new Date();
        nextFriday.setDate(now.getDate() + (5 + 7 - now.getDay()) % 7);
        nextFriday.setHours(12, 0, 0, 0);
        if (now > nextFriday) nextFriday.setDate(nextFriday.getDate() + 7);
        const diff = nextFriday - now;
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff % 86400000) / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        document.getElementById('timer').innerText = `المتبقي: ${d} يوم و ${h} ساعة و ${m} دقيقة`;
    }
    setInterval(updateTimer, 60000);
    updateTimer();
</script>
</body>
</html>
